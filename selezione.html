<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selezione Foto - G&L Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f4f6f9;color:#333;min-height:100vh}
.header{background:#2c3e50;color:#fff;padding:15px 20px;text-align:center}
.header h1{font-size:24px}
.header p{font-size:13px;opacity:.8;margin-top:5px}
.gallery-container{max-width:1400px;margin:0 auto;padding:20px}
.stats-bar{background:#fff;padding:15px 20px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.05);flex-wrap:wrap;gap:10px}
.stats-bar .stat{font-size:14px}
.stats-bar .stat strong{color:#667eea;font-size:18px}
.stats-bar .selected-count{color:#27ae60;font-weight:bold}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
.photo-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:1;box-shadow:0 2px 10px rgba(0,0,0,.1);transition:transform .2s}
.photo-card:hover{transform:scale(1.03)}
.photo-card img{width:100%;height:100%;object-fit:cover}
.photo-card .photo-number{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:15px;font-size:12px;font-weight:600}
.photo-card.selected{border:3px solid #e74c3c}
.photo-card.selected::after{content:'❤️';position:absolute;top:10px;right:10px;font-size:24px;background:rgba(255,255,255,.9);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.photo-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center}
.photo-modal.active{display:flex}
.photo-modal img{max-width:90%;max-height:85vh;object-fit:contain}
.modal-close{position:absolute;top:20px;right:30px;color:#fff;font-size:36px;cursor:pointer;z-index:1001}
.modal-heart{position:absolute;top:20px;left:30px;font-size:36px;cursor:pointer;z-index:1001;color:#fff;transition:transform .2s}
.modal-heart.active{color:#e74c3c;transform:scale(1.2)}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:48px;cursor:pointer;padding:20px;z-index:1001;user-select:none}
.modal-nav.prev{left:20px}
.modal-nav.next{right:20px}
.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px;box-shadow:0 -2px 10px rgba(0,0,0,.1);display:flex;justify-content:space-around;align-items:center;z-index:100}
.mobile-nav button{padding:12px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
.mobile-nav .btn-prev,.mobile-nav .btn-next{background:#667eea;color:#fff}
.mobile-nav .btn-heart{background:#fff;border:2px solid #e74c3c;color:#e74c3c;font-size:20px}
.mobile-nav .btn-heart.active{background:#e74c3c;color:#fff}
.mobile-nav .btn-send{background:#27ae60;color:#fff}
@media(max-width:768px){
    .photo-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    .header h1{font-size:18px}
    .stats-bar{font-size:12px}
}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="header">
    <h1>📸 G&L Studio - Selezione Foto</h1>
    <p>Clicca sulle foto per selezionarle con il cuore ❤️</p>
</div>

<div class="gallery-container">
    <div class="stats-bar">
        <div class="stat">📷 Totale: <strong class="total-photos">0</strong> foto</div>
        <div class="stat">❤️ Selezionate: <strong class="selected-count">0</strong></div>
    </div>
    <div id="photoGallery" class="photo-grid"></div>
</div>

<div class="mobile-nav">
    <button class="btn-prev" onclick="prevPhoto()">◀ Prec</button>
    <button class="btn-heart" id="mobileHeart" onclick="toggleHeart()">❤️</button>
    <button class="btn-next" onclick="nextPhoto()">Succ ▶</button>
    <button class="btn-send" onclick="inviaSelezione()">📤 Invia</button>
</div>

<div id="photoModal" class="photo-modal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <span class="modal-heart" id="modalHeart" onclick="toggleHeart()"></span>
    <span class="modal-nav prev" onclick="prevPhoto()">‹</span>
    <img id="modalImage" src="" alt="Foto">
    <span class="modal-nav next" onclick="nextPhoto()">›</span>
</div>

<script>
let photos = [];
let selectedPhotos = new Set();
let currentPhotoIndex = 0;
let galleryId = null;

document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    galleryId = urlParams.get('gallery');
    if (!galleryId) {
        alert('❌ Galleria non trovata! Contatta lo studio.');
        return;
    }
    loadPhotos();
});

function loadPhotos() {
    const db = JSON.parse(localStorage.getItem('gl_studio_unified_db'));
    if (!db || !db.albums) {
        alert('❌ Nessuna galleria trovata!');
        return;
    }
    const gallery = db.albums.find(g => g.id === galleryId);
    if (!gallery) {
        alert('❌ Galleria non trovata!');
        return;
    }
    photos = gallery.photos || [];
    if (photos.length === 0) {
        alert('⚠️ Nessuna foto nella galleria!');
        return;
    }
    document.querySelector('.total-photos').textContent = photos.length;
    renderGallery();
}

function renderGallery() {
    const gallery = document.getElementById('photoGallery');
    gallery.innerHTML = '';
    photos.forEach((photo, index) => {
        const card = document.createElement('div');
        card.className = 'photo-card' + (selectedPhotos.has(index) ? ' selected' : '');
        card.innerHTML = '<img src="' + photo + '" alt="Foto ' + (index + 1) + '" onclick="openModal(' + index + ')"><div class="photo-number">' + (index + 1) + '</div>';
        gallery.appendChild(card);
    });
}

function openModal(index) {
    currentPhotoIndex = index;
    const modal = document.getElementById('photoModal');
    const modalImg = document.getElementById('modalImage');
    const heartBtn = document.getElementById('modalHeart');
    modalImg.src = photos[index];
    modal.classList.add('active');
    updateHeartButton();
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('photoModal').classList.remove('active');
    document.body.style.overflow = 'auto';
}

function changePhoto(direction) {
    currentPhotoIndex += direction;
    if (currentPhotoIndex < 0) currentPhotoIndex = photos.length - 1;
    else if (currentPhotoIndex >= photos.length) currentPhotoIndex = 0;
    document.getElementById('modalImage').src = photos[currentPhotoIndex];
    updateHeartButton();
}

function updateHeartButton() {
    const heartBtn = document.getElementById('modalHeart');
    const mobileHeart = document.getElementById('mobileHeart');
    if (selectedPhotos.has(currentPhotoIndex)) {
        heartBtn.textContent = '❤️';
        heartBtn.classList.add('active');
        mobileHeart.classList.add('active');
    } else {
        heartBtn.textContent = '🤍';
        heartBtn.classList.remove('active');
        mobileHeart.classList.remove('active');
    }
}

function toggleHeart() {
    if (selectedPhotos.has(currentPhotoIndex)) {
        selectedPhotos.delete(currentPhotoIndex);
    } else {
        selectedPhotos.add(currentPhotoIndex);
    }
    updateCounter();
    renderGallery();
    updateHeartButton();
}

function nextPhoto() { changePhoto(1); }
function prevPhoto() { changePhoto(-1); }

function updateCounter() {
    document.querySelector('.selected-count').textContent = selectedPhotos.size;
}

function inviaSelezione() {
    if (selectedPhotos.size === 0) {
        alert('⚠️ Seleziona almeno una foto prima di inviare!');
        return;
    }
    if (!confirm('✅ Hai selezionato ' + selectedPhotos.size + ' foto su ' + photos.length + '.\n\nConfermi l\'invio della selezione?')) {
        return;
    }
    const db = JSON.parse(localStorage.getItem('gl_studio_unified_db'));
    const gallery = db.albums.find(g => g.id === galleryId);
    if (gallery) {
        gallery.selection = Array.from(selectedPhotos).map(i => photos[i]);
        gallery.selectionDate = new Date().toISOString();
        gallery.selectedNames = Array.from(selectedPhotos).map(i => 'Foto_' + (i + 1) + '.jpg');
        gallery.downloaded = false;
        localStorage.setItem('gl_studio_unified_db', JSON.stringify(db));
    }
    showSuccessMessage();
}

function showSuccessMessage() {
    document.querySelector('.gallery-container').style.display = 'none';
    document.querySelector('.header').style.display = 'none';
    document.querySelector('.mobile-nav').style.display = 'none';
    
    const successDiv = document.createElement('div');
    successDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px;';
    
    successDiv.innerHTML = '<div style="background:white;padding:50px 40px;border-radius:20px;text-align:center;max-width:500px;box-shadow:0 10px 30px rgba(0,0,0,0.3);">' +
        '<div style="font-size:80px;margin-bottom:20px;animation:bounceIn 0.6s;">✅</div>' +
        '<h2 style="color:#2c3e50;margin-bottom:15px;font-size:28px;">Selezione Inviata!</h2>' +
        '<p style="font-size:18px;color:#555;margin-bottom:20px;line-height:1.6;">Grazie! La tua selezione è stata inviata correttamente.<br>Hai selezionato <strong style="color:#667eea;">' + selectedPhotos.size + ' foto</strong> su ' + photos.length + '.</p>' +
        '<div style="background:#e8f4fd;padding:20px;border-radius:10px;margin:20px 0;text-align:left;border-left:4px solid #3498db;">' +
        '<h3 style="color:#2980b9;margin-bottom:10px;">📞 Contatta lo Studio</h3>' +
        '<p style="margin:5px 0;font-size:14px;color:#555;">Lo studio ti contatterà presto per concordare i dettagli.</p>' +
        '<p style="margin:15px 0 5px 0;font-size:14px;color:#555;"><strong>Per informazioni immediate:</strong></p>' +
        '<p style="margin:5px 0;font-size:14px;color:#555;">📞 Tel: 3206337370 - 3669381103</p>' +
        '<p style="margin:5px 0;font-size:14px;color:#555;">📧 Email: weddinggel@aruba.it</p>' +
        '<p style="margin:5px 0;font-size:14px;color:#555;">📍 Via Ciarrocco, 21 – Canicattì (AG)</p>' +
        '</div>' +
        '<button onclick="location.reload()" style="background:#667eea;color:white;border:none;padding:15px 30px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:600;margin-top:20px;">🔄 Torna all\'inizio</button>' +
        '</div>';
    
    const style = document.createElement('style');
    style.textContent = '@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}';
    document.head.appendChild(style);
    
    document.body.appendChild(successDiv);
}

document.addEventListener('keydown', function(e) {
    if (!document.getElementById('photoModal').classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowLeft') prevPhoto();
    else if (e.key === 'ArrowRight') nextPhoto();
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleHeart(); }
});

document.getElementById('photoModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
</script>
</body>
</html>
