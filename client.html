<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria Cliente - G&L Studio</title>
    <link rel="stylesheet" href="client.css">
</head>
<body>
    <div class="container">
        <div id="loginSection" class="auth-container login-section">
            <div class="logo-container">
                <img src="https://via.placeholder.com/150x150.png?text=G%26L+Studio" alt="Logo G&L Studio">
            </div>
            <h1>🔐 Accesso Galleria</h1>
            <form id="clientLoginForm">
                <div class="form-group">
                    <label for="username">Nome Utente:</label>
                    <input type="text" id="username" required placeholder="Inserisci username">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required placeholder="Inserisci password">
                </div>
                <button type="submit" class="btn-primary">Accedi</button>
                <p id="authError" class="error-message"></p>
            </form>
        </div>
        <div id="gallerySection" class="auth-container gallery-section" style="display:none;">
            <h1>✅ GRAZIE PER LA FIDUCIA</h1>
            <p style="margin-bottom:30px; color:#555;">Le tue foto sono pronte per essere scaricate.</p>
            <a id="galleryLink" href="#" class="gallery-btn" target="_blank">VAI A GALLERY - CLICCA QUI</a>
        </div>
    </div>
    <script src="client.js"></script>
</body>
</html>
