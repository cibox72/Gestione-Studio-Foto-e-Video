<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria Cliente - G&L Studio</title>
    <link rel="stylesheet" href="client.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="logo-container">
                <img src="logo.png" alt="G&L Studio Logo" onerror="this.style.display='none'">
            </div>
            
            <div id="loginSection" class="login-section">
                <h1>Accesso Galleria</h1>
                
                <div id="authError" class="error-message"></div>
                
                <form id="clientLoginForm">
                    <div class="form-group">
                        <label for="username">Nome Utente:</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    
                    <button type="submit" class="btn-primary">Accedi</button>
                </form>
            </div>
            
            <div id="gallerySection" class="gallery-section" style="display: none;">
                <h1>GRAZIE PER LA FIDUCIA</h1>
                <a id="galleryLink" href="#" target="_blank" class="gallery-btn">
                    VAI A GALLERY - CLICCA QUI
                </a>
            </div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
